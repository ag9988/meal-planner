<title>Meal Planner</title>
<style>
  :root {
    --bg: #f7f4ef;
    --card: #ffffff;
    --accent: #c85a2a;
    --accent2: #4a7c59;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --border: #e5e0d8;
    --check: #4a7c59;
    --tag-bg: #f0ebe2;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-back {
    width: 36px; height: 36px;
    border: none; background: var(--tag-bg);
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text);
    flex-shrink: 0;
  }
  .header-title { font-size: 18px; font-weight: 700; flex: 1; }
  .header-subtitle { font-size: 13px; color: var(--text2); }

  /* ── HOME ── */
  #home { padding: 16px; }
  .home-greeting { margin-bottom: 20px; }
  .home-greeting h1 { font-size: 26px; font-weight: 800; line-height: 1.2; }
  .home-greeting p { font-size: 14px; color: var(--text2); margin-top: 4px; }

  .filters {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--card); font-size: 13px; font-weight: 500; cursor: pointer;
    color: var(--text2); transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: white;
  }

  .recipe-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .recipe-card {
    background: var(--card); border-radius: 16px;
    box-shadow: var(--shadow); overflow: hidden;
    cursor: pointer; transition: transform 0.15s;
    border: 1px solid var(--border);
  }
  .recipe-card:active { transform: scale(0.97); }
  .recipe-card-emoji {
    height: 90px; display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    background: linear-gradient(135deg, var(--tag-bg) 0%, #ede7da 100%);
  }
  .recipe-card-body { padding: 10px 12px 12px; }
  .recipe-card-name { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 10px; background: var(--tag-bg); color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .tag.rice { background: #fef3c7; color: #92400e; }
  .tag.pasta { background: #ede9fe; color: #5b21b6; }
  .tag.salad { background: #d1fae5; color: #065f46; }
  .tag.time { background: #fee2e2; color: #991b1b; }

  /* ── RECIPE DETAIL ── */
  #recipe { display: none; }
  .recipe-hero {
    height: 160px; display: flex; align-items: center; justify-content: center;
    font-size: 80px;
    background: linear-gradient(135deg, #f0ebe2 0%, #ede7da 100%);
  }
  .recipe-info { padding: 16px; }
  .recipe-title { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
  .recipe-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

  /* ── TABS ── */
  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    margin: 0 16px; position: sticky; top: 60px; z-index: 50;
    background: var(--bg);
  }
  .tab-btn {
    flex: 1; padding: 12px 8px; border: none; background: transparent;
    font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer;
    border-bottom: 2.5px solid transparent; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; padding: 16px; }
  .tab-content.active { display: block; }

  /* ── INGREDIENTS / STEPS ── */
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text2); margin: 16px 0 8px;
  }
  .section-label:first-child { margin-top: 0; }

  .ingredient-list { list-style: none; }
  .ingredient-list li {
    padding: 9px 0; border-bottom: 1px solid var(--border);
    font-size: 15px; display: flex; gap: 10px;
  }
  .ingredient-list li:last-child { border-bottom: none; }
  .ingredient-list li::before {
    content: '•'; color: var(--accent); font-size: 18px; line-height: 1;
    flex-shrink: 0;
  }

  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li {
    counter-increment: steps;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    font-size: 15px; line-height: 1.6; display: flex; gap: 12px;
  }
  .steps-list li:last-child { border-bottom: none; }
  .steps-list li::before {
    content: counter(steps);
    min-width: 26px; height: 26px;
    background: var(--accent); color: white;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }

  /* ── GROCERY LIST ── */
  .grocery-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .grocery-header h3 { font-size: 16px; font-weight: 700; }
  .clear-btn {
    font-size: 13px; color: var(--accent); background: none;
    border: none; cursor: pointer; font-weight: 600; padding: 4px 8px;
  }
  .grocery-group { margin-bottom: 20px; }
  .grocery-group-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text2); margin-bottom: 8px;
  }
  .grocery-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .grocery-item:last-child { border-bottom: none; }
  .grocery-item input[type="checkbox"] { display: none; }
  .grocery-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: white;
  }
  .grocery-check svg { display: none; }
  .grocery-item.checked .grocery-check {
    background: var(--check); border-color: var(--check);
  }
  .grocery-item.checked .grocery-check svg { display: block; }
  .grocery-item-text {
    font-size: 15px; flex: 1; transition: all 0.15s;
  }
  .grocery-item.checked .grocery-item-text {
    text-decoration: line-through; color: var(--text2);
  }

  .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 16px; }
  .progress-bar { height: 100%; background: var(--check); border-radius: 2px; transition: width 0.3s; }

  /* ── EMPTY / UTILITY ── */
  .hidden { display: none !important; }
  .page { padding-bottom: env(safe-area-inset-bottom, 24px); }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="header" id="appHeader">
  <button class="header-back hidden" id="backBtn" onclick="goHome()">←</button>
  <div>
    <div class="header-title" id="headerTitle">🍽 Meal Planner</div>
    <div class="header-subtitle" id="headerSub">10 recipes · 2 people</div>
  </div>
</div>

<!-- ══ HOME ══ -->
<div id="home" class="page">
  <div style="padding:16px 16px 0">
    <div class="home-greeting">
      <h1>What are we cooking? 🔥</h1>
      <p>Tap a recipe to see ingredients & grocery list</p>
    </div>
    <div class="filters" id="filterBar">
      <button class="filter-btn active" onclick="filterRecipes('all', this)">All</button>
      <button class="filter-btn" onclick="filterRecipes('rice', this)">🍚 Rice</button>
      <button class="filter-btn" onclick="filterRecipes('pasta', this)">🍝 Pasta</button>
      <button class="filter-btn" onclick="filterRecipes('salad', this)">🥗 Salad</button>
    </div>
  </div>
  <div class="recipe-grid" id="recipeGrid" style="padding:0 16px 24px"></div>
</div>

<!-- ══ RECIPE DETAIL ══ -->
<div id="recipe" class="page">
  <div class="recipe-hero" id="recipeHero"></div>
  <div class="recipe-info">
    <div class="recipe-title" id="recipeTitle"></div>
    <div class="recipe-meta" id="recipeMeta"></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('ingredients', this)">Ingredients</button>
    <button class="tab-btn" onclick="switchTab('steps', this)">Steps</button>
    <button class="tab-btn" onclick="switchTab('grocery', this)">🛒 Grocery</button>
  </div>
  <div id="tab-ingredients" class="tab-content active"></div>
  <div id="tab-steps" class="tab-content"></div>
  <div id="tab-grocery" class="tab-content"></div>
</div>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let currentRecipeId = null;
let currentFilter = 'all';

function getCheckedKey(recipeId) { return `checked_${recipeId}`; }
function getChecked(recipeId) {
  try { return JSON.parse(localStorage.getItem(getCheckedKey(recipeId)) || '{}'); }
  catch { return {}; }
}
function setChecked(recipeId, checked) {
  localStorage.setItem(getCheckedKey(recipeId), JSON.stringify(checked));
}

// ═══════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════
function filterRecipes(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('recipeGrid');
  const filtered = currentFilter === 'all'
    ? recipes
    : recipes.filter(r => r.side === currentFilter);
  grid.innerHTML = filtered.map(r => `
    <div class="recipe-card" onclick="openRecipe('${r.id}')">
      <div class="recipe-card-emoji">${r.emoji}</div>
      <div class="recipe-card-body">
        <div class="recipe-card-name">${r.name}</div>
        <div class="tags">
          <span class="tag ${r.side}">${r.side === 'rice' ? '🍚' : r.side === 'pasta' ? '🍝' : '🥗'} ${r.side}</span>
          <span class="tag time">⏱ ${r.time}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════
// RECIPE DETAIL
// ═══════════════════════════════════════════════════
function openRecipe(id) {
  currentRecipeId = id;
  const r = recipes.find(x => x.id === id);
  document.getElementById('home').style.display = 'none';
  document.getElementById('recipe').style.display = 'block';
  document.getElementById('backBtn').classList.remove('hidden');
  document.getElementById('headerTitle').textContent = r.cuisine + ' · ' + r.protein;
  document.getElementById('headerSub').textContent = r.time + ' · 2 servings';

  document.getElementById('recipeHero').textContent = r.emoji;
  document.getElementById('recipeTitle').textContent = r.name;
  document.getElementById('recipeMeta').innerHTML = `
    <span class="tag ${r.side}">${r.side === 'rice' ? '🍚' : r.side === 'pasta' ? '🍝' : '🥗'} ${r.side}</span>
    <span class="tag">${r.cuisine}</span>
    <span class="tag time">⏱ ${r.time}</span>
    <span class="tag">👥 2 people</span>
  `;

  // Ingredients tab
  document.getElementById('tab-ingredients').innerHTML = r.ingredients.map(g => `
    <p class="section-label">${g.group}</p>
    <ul class="ingredient-list">
      ${g.items.map(i => `<li>${i}</li>`).join('')}
    </ul>
  `).join('');

  // Steps tab
  document.getElementById('tab-steps').innerHTML = `
    <ol class="steps-list">
      ${r.steps.map(s => `<li><span>${s}</span></li>`).join('')}
    </ol>
  `;

  // Grocery tab
  renderGrocery(r);

  // Reset to ingredients tab
  switchTab('ingredients', document.querySelectorAll('.tab-btn')[0]);
  window.scrollTo(0, 0);
}

function renderGrocery(r) {
  const checked = getChecked(r.id);
  const allItems = r.grocery.flatMap(g => g.items);
  const checkedCount = allItems.filter(item => checked[item]).length;
  const pct = allItems.length ? (checkedCount / allItems.length * 100) : 0;

  document.getElementById('tab-grocery').innerHTML = `
    <div class="grocery-header">
      <h3>🛒 Grocery List</h3>
      <button class="clear-btn" onclick="clearGrocery('${r.id}')">Clear all</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" style="width:${pct}%" id="groceryProgress"></div>
    </div>
    ${r.grocery.map(g => `
      <div class="grocery-group">
        <div class="grocery-group-title">${g.category}</div>
        ${g.items.map(item => {
          const key = item;
          const isChecked = !!checked[key];
          return `
            <div class="grocery-item ${isChecked ? 'checked' : ''}" onclick="toggleGrocery('${r.id}', this, '${item.replace(/'/g, "\\'")}')">
              <div class="grocery-check">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="grocery-item-text">${item}</span>
            </div>
          `;
        }).join('')}
      </div>
    `).join('')}
  `;
}

function toggleGrocery(recipeId, el, item) {
  el.classList.toggle('checked');
  const checked = getChecked(recipeId);
  if (el.classList.contains('checked')) {
    checked[item] = true;
  } else {
    delete checked[item];
  }
  setChecked(recipeId, checked);

  // Update progress bar
  const r = recipes.find(x => x.id === recipeId);
  const allItems = r.grocery.flatMap(g => g.items);
  const checkedCount = Object.keys(checked).length;
  const pct = allItems.length ? (checkedCount / allItems.length * 100) : 0;
  const bar = document.getElementById('groceryProgress');
  if (bar) bar.style.width = pct + '%';
}

function clearGrocery(recipeId) {
  setChecked(recipeId, {});
  const r = recipes.find(x => x.id === recipeId);
  renderGrocery(r);
}

// ═══════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════
function goHome() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('recipe').style.display = 'none';
  document.getElementById('backBtn').classList.add('hidden');
  document.getElementById('headerTitle').textContent = '🍽 Meal Planner';
  document.getElementById('headerSub').textContent = '10 recipes · 2 people';
  currentRecipeId = null;
  window.scrollTo(0, 0);
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderGrid();
</script>
